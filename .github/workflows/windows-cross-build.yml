name: Windows Cross Build

on:
  push:
    paths:
      - 'src/desktop/**'
      - '.github/workflows/windows-cross-build.yml'
  pull_request:
    paths:
      - 'src/desktop/**'
      - '.github/workflows/windows-cross-build.yml'

jobs:
  windows-gnu-cross-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: src/desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64
          rustup target add x86_64-pc-windows-gnu

      - name: Build desktopctl (windows-gnu)
        run: cargo build --release --target x86_64-pc-windows-gnu -p desktopctl

      - name: Build desktopctld (windows-gnu)
        run: cargo build --release --target x86_64-pc-windows-gnu -p desktopctld
